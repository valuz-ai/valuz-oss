    SkillView:
      type: object
      required: [id, name, description, scope, source, path]
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        scope:
          type: string
          enum: [user, project, official, tenant]
        source:
          type: string
        path:
          type: string
        enabled:
          type: boolean
          default: false
        tags:
          type: array
          items:
            type: string
        slug:
          type: string
          default: ""
        icon:
          type: string
          nullable: true
        status:
          type: string
          default: available
        readonly:
          type: boolean
          default: false
        is_locked:
          type: boolean
          default: false
        lock_reason:
          type: string
          nullable: true
        project_root:
          type: string
          nullable: true
        origin_label:
          type: string
          nullable: true
        argument_hint:
          type: string
          nullable: true
        context:
          type: string
          nullable: true
        content_hash:
          type: string
          nullable: true
        manifest_hash:
          type: string
          nullable: true
        version:
          type: integer
          nullable: true
          minimum: 1
          description: |
            Optional integer version pulled from SKILL.md frontmatter `version: N`.
            Forking via staging sync (-vN) bumps this; legacy skills omit the field.
        folder_created_at:
          type: integer
          format: int64
          nullable: true
          description: |
            Unix epoch milliseconds (UTC); format via new Date(ms).
            Filesystem birthtime of the skill folder (macOS `st_birthtime`;
            Linux `statx` where available; falls back to `st_mtime`). Drives
            the DESC sort on the skill management page — newest folder
            first, `name` ASC as tiebreaker. `null` for legacy rows that
            weren't scanned with the new helper yet (next `startup_scan`
            backfills); the sort puts `null` last.
        creation_origin:
          type: string
          enum: [created, imported, discovered]
          default: discovered
          description: |
            Skill origin marker — host-side bookkeeping kept only in the
            `valuz_skill_index` DB row, never written into SKILL.md.
            `"created"` for the UI dialog / skill-creator AI session /
            duplicate action; `"imported"` for archive / URL / directory
            import; `"discovered"` when the folder was found on disk by
            the filesystem scan (e.g. hand-dropped or symlinked into
            `~/.agents/skills/`) rather than originated by Valuz. Drives
            the "创建" vs "同步" badge in the .agents group on the skill
            management page; `"discovered"` renders no badge.
    SkillDetail:
      allOf:
        - $ref: "#/components/schemas/SkillView"
        - type: object
          properties:
            instructions_markdown:
              type: string
              nullable: true
            file_count:
              type: integer
              default: 0
            root_path:
              type: string
              nullable: true
            manifest_filename:
              type: string
              nullable: true
