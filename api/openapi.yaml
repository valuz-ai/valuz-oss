              schema:
                $ref: "#/components/schemas/SkillsCatalog"
    # NOTE: workspace skill binding (PUT skills / scan / state) was removed —
    # skills bind on the Agent now (08-agents-module). GET stays: it still
    # feeds the conversation composer's skill-insert chips.

  # ─── Sessions ──────────────────────────────────────────────────────

  /v1/sessions:
    get:
      summary: List sessions
      operationId: listSessions
      tags: [sessions]
      parameters:
        - name: workspace_id
          in: query
          schema:
            type: string
        - name: q
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Session list
          content:
            application/json:
              schema:
                type: object
                properties:
                  sessions:
                    type: array
                    items:
                      $ref: "#/components/schemas/SessionListItem"

    post:
      summary: Create a new session
      operationId: createSession
      tags: [sessions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionCreateRequest"
      responses:
        "201":
          description: Created session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

  /v1/sessions/{session_id}:
    get:
      summary: Get session detail
      operationId: getSession
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "404":
          description: Session not found

    patch:
      summary: Rename session
      operationId: renameSession
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Updated session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

    delete:
      summary: Delete session
      operationId: deleteSession
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Session deleted

  /v1/sessions/{session_id}/events:
    get:
      summary: List session events
      operationId: listSessionEvents
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
        - name: after_seq
          in: query
          schema:
            type: integer
            default: 0
      responses:
        "200":
          description: Session events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionEventsResponse"

  /v1/sessions/{session_id}/messages:
    post:
      summary: Send message to session
      operationId: sendMessage
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionMessageRequest"
      responses:
        "200":
          description: Run response with events
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRunResponse"
        "409":
