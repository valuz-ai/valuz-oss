      description: >-
        v2 派驻 (live reference). Config lives on the agent, so there is no
        per-deploy provider/model/connector override — just the source agent and
        an optional project-local handle.
      properties:
        source_agent_slug: {type: string}
        # Optional — backend derives from the source agent's name, unique
        # within the target workspace, when omitted (VALUZ-AGENT-SLUG).
        agent_slug: {type: string, nullable: true}
