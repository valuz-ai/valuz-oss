          items:
            $ref: "#/components/schemas/SkillImportCandidate"

    SkillImportCandidate:
      type: object
      required: [preview_id, name, description]
      properties:
        preview_id:
          type: string
        name:
          type: string
        description:
          type: string
        file_count:
          type: integer
          default: 0
        relpath:
          type: string
          default: ""

    SkillImportPreviewFile:
      type: object
      required: [path, type]
      properties:
        path:
          type: string
        type:
          type: string
          enum: [file, directory]
        size:
          type: integer
          nullable: true

    SkillImportArchiveConfirmRequest:
      type: object
      required: [preview_id]
      properties:
        preview_id:
          type: string
        name:
          type: string
          nullable: true
        target_scope:
          type: string
          enum: [user, project, official, tenant]
          default: user
        workspace_id:
          type: string
          nullable: true
        add_to_workspace:
          type: boolean
          default: false

    SkillImportDirectoryPreviewRequest:
      type: object
      required: [directory_path]
      properties:
        directory_path:
          type: string
        target_scope:
          type: string
          enum: [user, project, official, tenant]
          default: user
        workspace_id:
          type: string
          nullable: true

    # ─── Session Schemas ───────────────────────────────────────────────

    SessionListItem:
      type: object
      required: [id, workspace_id, status, origin, updated_at]
      properties:
        id:
          type: string
        workspace_id:
          type: string
        name:
          type: string
          nullable: true
        status:
          type: string
          enum: [created, running, idle, failed, cancelled, archived]
        origin:
          type: string
          enum: [user, schedule]
        last_user_message_text:
          type: string
          nullable: true
        locked_model_id:
          type: string
          nullable: true
        locked_provider_id:
          type: string
          nullable: true
          description: >-
            Provider id locked at session creation. Promoted from SessionDetail
            to SessionListItem so the desktop sidebar's session list can drive
            the composer's (providerId, modelId) model selector without an extra
            detail fetch — without this, the composer falls back to the
            workspace default provider even though the session is wired to a
            different model end-to-end.
        updated_at:
          type: integer
          format: int64
          description: Unix epoch milliseconds (UTC). Format via new Date(ms).
        runtime_provider:
          type: string
          enum: [claude_agent, codex, deepagents]
          default: deepagents
          description: |
            Kernel runtime stamped at session creation. Surfaced so the
            UI can render a runtime badge in the session list without
            another fetch.
        permission_mode:
          type: string
          enum: [default, auto_review, full_access]
          default: full_access
          description: |
            Approval mode for this session (kernel V5+1aae940; live-
            reconcile since V5+bba3014). ``default`` parks every shell /
            file-write / MCP-tool call on the host until the user
            decides; ``auto_review`` lets an LLM classifier auto-decide
            (Claude tier only — DeepAgents 400s); ``full_access``
            auto-approves everything (CI / batch mode, current default).
            Mutable via ``PATCH /v1/sessions/{id}/permission-mode`` —
            applies on next Send.
        effort:
          type: string
          enum: [low, medium, high, xhigh, max]
          nullable: true
          description: |
            Reasoning-effort budget (kernel V5+bba3014
            ``ModelSettings.effort``). ``null`` = SDK default. Mutable
            via ``PATCH /v1/sessions/{id}/effort`` — applies on next
            Send. Per-runtime mapping: Claude pass-through all 5 values;
            Codex ``max`` clamps to ``xhigh``; DeepAgents openai-
            completion ``max`` → ``xhigh``, anthropic pass-through,
            gemini ``xhigh|max`` → ``high``.
        task_id:
          type: string
          nullable: true
          description: |
            Owning task id if this session is part of a task run (lead
            session or dispatched sub-Run). ``null`` = a user-initiated
            standalone conversation. Surfaced here so UIs (e.g. the
            desktop sidebar's "recent sessions") can hide task-internal
            sessions, which are implementation details of the task run
            and not something the user opened directly.

    TodoItem:
      type: object
      required: [content, status]
      properties:
        content:
          type: string
        status:
          type: string
          description: One of "pending", "in_progress", "completed".
        activeForm:
          type: string
          nullable: true
          description: |
            Gerund form rendered while the todo is in_progress (e.g.
            "Planning migration"). Camel-cased to match the Claude
            Agent SDK's TodoWrite payload verbatim.

    SessionDetail:
      allOf:
        - $ref: "#/components/schemas/SessionListItem"
        - type: object
          properties:
            total_tokens:
              type: integer
              default: 0
            total_cost_usd:
              type: number
              default: 0
            created_at:
              type: integer
              format: int64
              nullable: true
              description: Unix epoch milliseconds (UTC). Format via new Date(ms).
            todos:
              type: array
              nullable: true
              description: |
                Latest TODO snapshot from the agent's TodoWrite calls
                (kernel V5+messages). null when the agent has never
                touched the list; an empty list is a valid "all done"
                signal preserved by the kernel's change-only semantics.
              items:
                $ref: "#/components/schemas/TodoItem"
            instructions:
              type: string
              nullable: true
              description: |
                Frozen system-prompt append captured at session creation
                from the workspace's then-current ``instructions_md``
                (ADR-008). The runtime hands this verbatim to the model
                on every turn; workspace edits after creation do *not*
                mutate this field. null when the workspace had no
                instructions at session-create time. Frontend session
                panels should render this — NOT the live workspace
                ``instructions_md`` — so users see the prompt the
                running agent actually has.
            agent_slug:
              type: string
              nullable: true
              description: |
                Workspace-local agent handle for this session when it was
                created from a named workspace agent (e.g. a Project Task
                lead/member). null for plain chat sessions.

    RuntimeListItem:
      type: object
      required:
        - id
        - display_name
        - supported_protocols
        - available
      properties:
        id:
          type: string
          enum: [claude_agent, codex, deepagents]
          description: |
            Internal runtime enum — matches kernel
            ``Session.runtime_provider``. Stable wire identifier even
            when ``display_name`` is rebranded (e.g. ``deepagents`` is
            displayed as "Valuz Agent").
        display_name:
          type: string
          description: User-facing label for the picker.
        supported_protocols:
          type: array
          items:
            type: string
            enum: [anthropic, openai-completion, openai-response, gemini]
          description: |
            API protocols this runtime can dispatch (kernel V5+bba3014
            4-value enum, user-facing hyphen form). The picker uses
            this to filter eligible providers. Per-runtime:
              * claude_agent → [anthropic]
              * codex → [openai-response]
              * deepagents → [anthropic, openai-completion, gemini]
        requires_binary:
          type: string
          nullable: true
          description: |
            Name of an external CLI the runtime spawns. ``null`` for
            pure-Python runtimes. Surfaced so the UI can name the
            missing binary in setup instructions.
        available:
          type: boolean
          description: |
            ``true`` when the runtime can actually run on this host.
            ``false`` greys out the picker option.
        unavailable_reason:
          type: string
          nullable: true
          description: |
            Short, user-actionable explanation when ``available`` is
            ``false`` (e.g. ``"'codex' binary not found on PATH; install
            it first"``). ``null`` when available.

    SystemStatusResponse:
      type: object
      required:
        - status
        - pid
        - started_at
        - uptime_seconds
        - version
        - kernel_pin
        - port
        - active_session_count
        - db_path
        - log_path
        - log_dir
        - data_dir
        - runtimes_available
        - warnings
      properties:
        status:
          type: string
          enum: [running, starting, degraded]
          description: |
            High-level health label. ``running`` = boot complete + DB
            reachable. ``starting`` = startup hooks still in progress.
            ``degraded`` = boot complete but at least one
            ``warnings[]`` entry is non-empty (e.g. codex MCP handshake
            failed at startup).
        pid:
          type: integer
        started_at:
          type: integer
          format: int64
          description: Unix epoch milliseconds (UTC) boot timestamp. Format via new Date(ms).
        uptime_seconds:
          type: number
          format: double
          description: Seconds since process start.
        version:
          type: string
          description: ``valuz_agent`` package version.
        kernel_pin:
          type: string
          description: |
            Vendored kernel commit short SHA, parsed from
            ``backend/kernel/KERNEL_VERSION`` so the UI can show which
            agent-harness build is running.
        port:
          type: integer
          description: TCP port the server is listening on.
        active_session_count:
          type: integer
          description: Sessions currently in ``running`` status (kernel store).
        db_path:
          type: string
          description: Absolute path to the SQLite database file.
        log_path:
          type: string
          description: |
            Absolute path to the rolling log file the backend writes
            structured JSON lines to. The desktop ``服务`` panel uses
            this to expose an "open in editor" escape hatch.
        log_dir:
          type: string
          description: |
            Parent directory of ``log_path`` — surfaced separately so
            "open log directory" goes to the folder, not the file.
        data_dir:
          type: string
          description: ``settings.data_dir`` (root of all valuz local writes).
        runtimes_available:
          type: array
          items:
            type: string
            enum: [claude_agent, codex, deepagents]
          description: Runtime ids the host can currently dispatch to.
        warnings:
          type: array
          items:
            type: string
          description: |
            Non-fatal issues detected at boot or since (e.g.
            ``"codex MCP handshake failed: <err>"``). Empty when healthy.

    SessionCreateRequest:
      type: object
      required: [workspace_id]
      properties:
        workspace_id:
          type: string
        title:
          type: string
          nullable: true
        model_id:
          type: string
          nullable: true
          description: |
            Optional explicit model id. ``null`` falls back to the bound
            provider's default model, then the workspace default, then a
            global fallback (kernel V5 dropped MODEL_CATALOG so any
            string is forwarded verbatim to the SDK).
        provider_id:
          type: string
          nullable: true
          description: |
            Optional provider id pinning the LLM gateway for this session.
            ``null`` lets the host pick one whose ``model_ids``
            contains ``model_id``.
        runtime_id:
          type: string
          nullable: true
          enum: [claude_agent, codex, deepagents, null]
          description: |
            Optional explicit Runtime Agent for this session. Allowed
            values match the kernel's ``Session.runtime_provider`` enum.
            ``null`` lets the host derive the runtime from the provider
            (based on ``provider_kind``) — kept for backwards
            compatibility with clients that pre-date the runtime picker.
            Unknown values return 422.
        mcp_provider_slugs:
          type: array
          nullable: true
          items:
            type: string
          description: |
            MCP data sources to enable for this session (e.g.
            ``["reportify"]``). ``null`` defaults to every connected
            provider; ``[]`` is honoured as "explicitly none".
        permission_mode:
          type: string
          nullable: true
          enum: [default, auto_review, full_access, null]
          description: |
            Approval mode for the new session (kernel V5+1aae940; live-
            reconcile since V5+bba3014). ``null`` falls through to the
            kernel default of ``full_access``. DeepAgents rejects
            ``auto_review`` (400). Mutable post-create via
            ``PATCH /v1/sessions/{id}/permission-mode``.
        effort:
          type: string
          nullable: true
          enum: [low, medium, high, xhigh, max, null]
          description: |
            Initial reasoning-effort budget (kernel V5+bba3014
            ``ModelSettings.effort``). ``null`` = SDK default. Mutable
            post-create via ``PATCH /v1/sessions/{id}/effort``.
        agent_slug:
          type: string
          nullable: true
          description: |
            Project member agent to bind this conversation to. When set,
            the session inherits runtime / model / provider / effort /
            instructions / skills / connectors from the agent and the
            model_id / provider_id / runtime_id / effort fields above are
            ignored. ``null`` keeps the classic model-picker path.

    SessionPermissionModeRequest:
      type: object
      required: [permission_mode]
      properties:
        permission_mode:
          type: string
          enum: [default, auto_review, full_access]
          description: |
            New approval mode for the session. Live-reconcile (kernel
            V5+bba3014): applies on the next Send. Claude uses the live
            ``set_permission_mode`` mutator (with fork-on-rebuild for
            the bypass tier); Codex threads
            ``approval_policy`` / ``sandbox_policy`` per-turn through
            ``turn_kwargs``; DeepAgents drops its cached graph for a
            cold rebuild. A turn already in flight keeps the mode it
            started with.

    SessionEffortRequest:
      type: object
      properties:
        effort:
          type: string
          nullable: true
          enum: [low, medium, high, xhigh, max, null]
          description: |
            New reasoning-effort budget for the session (kernel
            V5+bba3014). Live-reconcile: applies on the next Send.
            Claude cold-reloads the SDK client (effort is a build-time
            option); Codex drops it into
            ``turn_kwargs.reasoning_effort``; DeepAgents drops its
            cached graph so the next turn rebuilds the langchain chat
            client with the new value. ``null`` resets to the SDK
            default. Returns 400 on an unknown value.

    SessionActionRequest:
      type: object
      required: [pending_id, decision]
      description: |
        Body for ``POST /v1/sessions/{id}/actions``. Resolves a pending
        ``requires_action`` event with the user's decision. Mirrors the
        kernel's ``SubmitActionRequest`` shape (kernel V5+d008b53). The
        kernel exposes the same shape under ``/api/v1/sessions/{id}/actions``;
        both routes hit the same orchestrator instance.

        Decision verbs (V5+d008b53):
          - ``approve`` / ``reject`` — universal verbs for tool-approval
            subjects (v1).
          - ``answer`` — only valid for ``clarifying_questions``;
            requires ``answers`` field.
          - ``approve_with_changes`` — A1; requires ``modified_input``.
            Available only on runtimes whose SDK accepts modified args
            (Claude / DeepAgents; codex 400s).
          - ``approve_for_session`` — v2; the kernel commits a
            session-scoped rule from the staged pending's
            ``session_rule_preview``, and subsequent matching tool
            calls short-circuit with an ``auto_approved``
            ``action_resolved`` event.

        ``auto_approved`` / ``expired`` / ``interrupted`` are
        kernel-only emit verbs and are rejected as input.
      properties:
        pending_id:
          type: string
          description: |
            ``pending_id`` from the matching ``requires_action`` event.
        decision:
          type: string
          enum: [approve, approve_with_changes, approve_for_session, reject, answer]
        message:
          type: string
          nullable: true
          description: |
            Optional rejection reason; surfaced back to the agent
            (Claude ``PermissionResultDeny.message``, DeepAgents
            ``RejectDecision.message``; codex 0.116.0a1 logs only).
        answers:
          type: object
          nullable: true
          additionalProperties:
            oneOf:
              - type: string
              - type: array
                items:
                  type: string
          description: |
            Structured answers for ``clarifying_questions``. Keys are
            question texts (match ``payload.questions[].question`` from
            the ``requires_action`` event); values are the selected
            option ``label`` for single-select or a list for
            multi-select. Required iff ``decision == "answer"``;
            rejected otherwise (422).
        modified_input:
          type: object
          nullable: true
          additionalProperties: true
          description: |
            Replacement tool args for an ``approve_with_changes``
            decision. Same shape as ``payload.original_input`` on the
            ``requires_action`` event. Required iff ``decision ==
            "approve_with_changes"``; rejected otherwise (422). Claude
            maps it to ``PermissionResultAllow.updated_input``;
            DeepAgents to ``EditDecision.edited_action.args``.

    SessionActionResponse:
      type: object
      required: [session_id, pending_id, decision, accepted_at]
      properties:
        session_id:
          type: string
        pending_id:
          type: string
        decision:
          type: string
          enum: [approve, approve_with_changes, approve_for_session, reject, answer]
        accepted_at:
          type: integer
          format: int64
          description: |
            Unix epoch milliseconds (UTC); format via new Date(ms).
            Server timestamp the decision landed at. On idempotent
            replies (same decision retried), this is the *original*
            timestamp — clients can use this to deduplicate UI state.
        idempotent:
          type: boolean
          default: false
          description: |
            ``true`` when the route saw a repeat of an already-resolved
            decision. The runtime is not re-notified in that case;
            this is just an idempotency hint to the caller.
        rule_id:
          type: string
          nullable: true
          description: |
            UUID of the just-committed session-scoped rule. Populated
            only when ``decision == "approve_for_session"``; ``null``
            for every other verb. The frontend uses it to render the
            rule badge on the resolved card and to correlate future
            ``auto_approved`` events back to their originating pending.
            Idempotent retries surface the *original* ``rule_id`` so
            a WS/SSE reconnect doesn't think it created a new rule.

    SessionMessageRequest:
      type: object
      required: [prompt]
      properties:
        prompt:
          type: string
        provider_id:
          type: string
          nullable: true
          description: |
            Optional provider override for back-compat with older clients.
            The session's model is locked at creation; if this does not
            match the frozen value the service ignores it rather than
            failing.
        model_id:
          type: string
          nullable: true
          description: |
            Optional model override. Same back-compat semantics as
            ``provider_id`` — ignored when it does not match the
            session's frozen model.

    SessionEvent:
      type: object
      required: [event_type]
      properties:
        event_type:
          type: string
        payload:
          type: object
          additionalProperties:
            type: string

    SessionEventEnvelope:
      type: object
      required: [seq, event]
      properties:
        seq:
          type: integer
        event:
          $ref: "#/components/schemas/SessionEvent"
        timestamp:
          type: integer
          format: int64
          nullable: true
          description: >-
            Unix epoch milliseconds (UTC) the kernel persisted the event with.
            Format via new Date(ms).

    SessionEventsResponse:
      type: object
      required: [session_id, items]
      properties:
        session_id:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SessionEventEnvelope"

    SessionRunResponse:
      type: object
      required: [session, events]
      properties:
        session:
          $ref: "#/components/schemas/SessionDetail"
        events:
          type: array
          items:
            $ref: "#/components/schemas/SessionEventEnvelope"

    # ── Skills: File-level schemas ─────────────────────────────────

    SkillFileNode:
      type: object
      required: [name, path, type]
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [file, directory]
        size:
          type: integer
          nullable: true
        children:
          type: array
          items:
            $ref: "#/components/schemas/SkillFileNode"

    SkillFileContent:
      type: object
      required: [path, content]
      properties:
        path:
          type: string
        content:
          type: string
        encoding:
          type: string
          default: utf-8

    SkillFileAction:
      type: object
      required: [action, path]
      properties:
        action:
          type: string
          enum: [create, rename, delete]
        path:
          type: string
        new_path:
          type: string
          nullable: true
        content:
          type: string
          nullable: true

    SkillTagsResponse:
      type: object
      required: [tags]
      properties:
        tags:
          type: array
          items:
            type: string

    SkillImportUrlPreviewRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
        target_scope:
          type: string
          enum: [user, project, official, tenant]
          default: user
        workspace_id:
          type: string
          nullable: true

    SkillImportUrlConfirmRequest:
      type: object
      required: [preview_id]
      properties:
        preview_id:
          type: string
        name:
          type: string
          nullable: true
        target_scope:
          type: string
          enum: [user, project, official, tenant]
          default: user
        workspace_id:
          type: string
          nullable: true
        add_to_workspace:
          type: boolean
          default: false

    # ── Parser plugin / setup / routing schemas ────────────────────

    SetupRequirement:
      type: object
      required: [id, label_zh, kind]
      description: |
        Static metadata for a one-time setup operation (e.g. authorized
        model download). Mirrored on the FE so the license / source
        dialog can render without an extra round-trip.
      properties:
        id:
          type: string
        label_zh:
          type: string
        kind:
          type: string
          enum: [credential, model_download]
        network_required:
          type: boolean
          default: true
        size_bytes:
          type: integer
          nullable: true
        source:
          type: string
          nullable: true
        license_name:
          type: string
          nullable: true
        license_url:
          type: string
          nullable: true

    SetupJobStatus:
      type: object
      required:
        [setup_id, status, downloaded_bytes, total_bytes, error, source, started_at, completed_at, updated_at, requirement]
      properties:
        setup_id:
          type: string
        status:
          type: string
          enum: [pending, running, succeeded, failed, cancelled]
        downloaded_bytes:
          type: integer
        total_bytes:
          type: integer
          nullable: true
        error:
          type: string
          nullable: true
        source:
          type: string
          nullable: true
        started_at:
          type: integer
          format: int64
          nullable: true
          description: "Unix epoch milliseconds (UTC). Format via new Date(ms)."
        completed_at:
          type: integer
          format: int64
          nullable: true
          description: "Unix epoch milliseconds (UTC). Format via new Date(ms)."
        updated_at:
          type: integer
          format: int64
          nullable: true
          description: "Unix epoch milliseconds (UTC). Format via new Date(ms)."
        requirement:
          allOf:
            - $ref: "#/components/schemas/SetupRequirement"
          nullable: true

    SetupJobListResponse:
      type: object
      required: [jobs]
      properties:
        jobs:
          type: array
          items:
            $ref: "#/components/schemas/SetupJobStatus"

    StartSetupJobRequest:
      type: object
      required: [accept_license, confirmed_source]
      description: |
        Authorization payload. The server rejects the call unless both
        fields are present — see ``api/routes/parser.py:start_setup_job``.
      properties:
        accept_license:
          type: boolean
        confirmed_source:
          type: string

    ConfigField:
      type: object
      required: [key, label_zh, type]
      properties:
        key:
          type: string
        label_zh:
          type: string
        type:
          type: string
          enum: [string, secret, bool, select, number]
        required:
          type: boolean
          default: false
        default:
          nullable: true
        placeholder:
          type: string
          nullable: true
        help_zh:
          type: string
          nullable: true
        options:
          type: array
          nullable: true
          items:
            type: array
            minItems: 2
            maxItems: 2
            items:
              type: string

    PluginCapabilityStatus:
      type: object
      required: [kind, status]
      properties:
        kind:
          type: string
        status:
          type: string
          enum: [ready, needs_setup, unavailable]
        setup:
          allOf:
            - $ref: "#/components/schemas/SetupRequirement"
          nullable: true
        reason_zh:
          type: string
          nullable: true

    PluginDescriptor:
      type: object
      required:
        [id, name_zh, description_zh, mode, capabilities, config_schema, supported_kinds, is_configured, requires_secret]
      properties:
        id:
          type: string
        name_zh:
          type: string
        description_zh:
          type: string
        mode:
          type: string
          enum: [sync, async_poll]
        capabilities:
          type: array
          items:
            $ref: "#/components/schemas/PluginCapabilityStatus"
        config_schema:
          type: array
          items:
            $ref: "#/components/schemas/ConfigField"
        supported_kinds:
          type: array
          items:
            type: string
        is_configured:
          type: boolean
        requires_secret:
          type: boolean

    PluginsListResponse:
      type: object
      required: [plugins]
      properties:
        plugins:
          type: array
          items:
            $ref: "#/components/schemas/PluginDescriptor"

    ParserRoutingResponse:
      type: object
      required:
        [primary_plugin_id, by_kind, fallback_to_local_on_error, effective_by_kind, locked_kinds]
      properties:
        primary_plugin_id:
          type: string
        by_kind:
          type: object
          additionalProperties:
            type: string
        fallback_to_local_on_error:
          type: boolean
        effective_by_kind:
          type: object
          description: |
            Server-rendered mapping of ``kind → plugin_id`` showing what
            the router will actually choose given current settings.
            Mirrors the FE's display logic so the FE doesn't have to
            duplicate the capability gate.
          additionalProperties:
            type: string
        locked_kinds:
          type: array
          description: Kinds the router never routes away from light_local.
          items:
            type: string

    ParserRoutingPatchRequest:
      type: object
      description: All fields optional; only those provided are updated.
      properties:
        primary_plugin_id:
          type: string
        by_kind:
          type: object
          additionalProperties:
            type: string
        fallback_to_local_on_error:
          type: boolean

    PluginConfigResponse:
      type: object
      required: [plugin_id, enabled, has_secret, options]
      properties:
        plugin_id:
          type: string
        enabled:
          type: boolean
        has_secret:
          type: boolean
          description: True if an API key is stored. Plaintext is never returned.
        options:
          type: object
          additionalProperties: true

    PluginConfigPatchRequest:
      type: object
      properties:
        enabled:
          type: boolean
        secret:
          type: string
          description: |
            Plaintext API key. Hashed into the secret store on receipt;
            only the ref is persisted. Empty string clears the stored
            secret.
        options:
          type: object
          additionalProperties: true

    PluginTestResponse:
      type: object
      required: [ok, plugin_id]
      properties:
        ok:
          type: boolean
        plugin_id:
          type: string
        error:
          type: string
          nullable: true
        latency_ms:
          type: integer
          nullable: true
