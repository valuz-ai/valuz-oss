              schema:
                type: string
                description: Server-sent events with SessionEventEnvelope data
        "404":
          description: Session not found
        "409":
          description: Session already running

  /v1/sessions/{session_id}/interrupt:
    post:
      summary: Interrupt running session
      operationId: interruptSession
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session interrupted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

  /v1/sessions/{session_id}/cancel:
    post:
      summary: Cancel session
      operationId: cancelSession
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Session cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"

  /v1/sessions/{session_id}/regenerate:
    post:
      summary: Regenerate last assistant turn
      operationId: regenerateSession
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Regenerated response
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionRunResponse"

  /v1/sessions/{session_id}/permission-mode:
    patch:
      summary: Update session approval mode
      description: |
        Change the approval mode for an existing session (kernel
        V5+1aae940; live-reconcile since V5+bba3014). The new mode
        applies on the next Send: Claude uses ``set_permission_mode``
        (with fork-on-rebuild for the bypass tier — G1/G2 CLI
        gotchas); Codex threads ``approval_policy`` / ``sandbox_policy``
        per-turn via ``turn_kwargs``; DeepAgents drops its cached graph
        for a cold rebuild. A turn already in flight keeps the mode it
        started with. DeepAgents sessions reject ``auto_review`` (400 —
        only the Claude tier ships the LLM classifier today).
      operationId: updateSessionPermissionMode
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionPermissionModeRequest"
      responses:
        "200":
          description: Mode updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "400":
          description: Invalid mode for this runtime (e.g. auto_review on deepagents)
        "404":
          description: Session not found

  /v1/sessions/{session_id}/effort:
    patch:
      summary: Update session reasoning-effort budget
      description: |
        Change the reasoning-effort budget for an existing session
        (kernel V5+bba3014). Live-reconcile: the new effort applies on
        the next Send. Claude cold-reloads the SDK client (effort is a
        build-time option); Codex drops it into
        ``turn_kwargs.reasoning_effort`` (survives ``--resume``);
        DeepAgents drops its cached graph so the next turn rebuilds
        the langchain chat client with the new value.

        Per-runtime value mapping:
          * Claude: pass-through all 5 values.
          * Codex: ``max`` clamps to ``xhigh``.
          * DeepAgents openai-completion: ``max`` → ``xhigh``.
          * DeepAgents anthropic: pass-through.
          * DeepAgents gemini: ``xhigh|max`` → ``high``.

        ``effort=null`` resets to the SDK default.
      operationId: updateSessionEffort
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionEffortRequest"
      responses:
        "200":
          description: Effort updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionDetail"
        "400":
          description: Invalid effort value (not in low|medium|high|xhigh|max)
        "404":
          description: Session not found

  /v1/sessions/{session_id}/actions:
    post:
      summary: Resolve a pending approval
      description: |
        Resolve a pending ``requires_action`` event with a user
        decision (kernel V5+1aae940 — cross-runtime tool approval
        contract v1). Idempotent on ``(pending_id, decision)``;
        conflicting decisions for the same ``pending_id`` return 409
        with the original ``accepted_at``. Expired / interrupted
        pendings return 410. Same shape as the kernel-side
        ``POST /api/v1/sessions/{session_id}/actions``; both routes
        reach the same orchestrator.
      operationId: submitSessionAction
      tags: [sessions]
      parameters:
        - name: session_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionActionRequest"
      responses:
        "200":
          description: Decision accepted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionActionResponse"
        "400":
          description: Decision shape invalid for this pending's subject
        "404":
          description: Session or pending action not found
        "409":
          description: Pending already resolved with a different decision
        "410":
          description: Pending already expired / interrupted, or project deleted
        "501":
          description: Runtime has not implemented the approval bridge

  /v1/sessions/{session_id}/skills:
    get:
      summary: Get the per-session attached skill list
      description: |
        skill-creator is always active and is not included in this list.
        The returned ids reflect skills the user has explicitly attached
        to this session (e.g. via the in-chat skill picker).
      operationId: getSessionExtraSkills
      tags: [sessions]
      parameters:
        - in: path
          name: session_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Attached skill ids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionExtraSkillsResponse"
    put:
      summary: Replace the per-session attached skill list
      description: |
        Replaces (not appends) the previous list. skill-creator does not need
        to be listed; it is always active regardless.
      operationId: setSessionExtraSkills
      tags: [sessions]
      parameters:
        - in: path
          name: session_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionExtraSkillsRequest"
      responses:
        "200":
          description: Attached skill ids
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionExtraSkillsResponse"

  /v1/onboarding/example-project:
    post:
      summary: Create (or reuse) the onboarding example project
      operationId: createExampleProject
      tags: [onboarding]
      description: |
        One-shot endpoint called at the end of the onboarding flow.
        Creates ~/Valuz/示例项目, binds it as a workspace, and deploys
        the four official agents for the selected preset team.
        Fully idempotent — safe to call again if the user re-runs onboarding.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExampleProjectRequest"
      responses:
        "200":
          description: Workspace created or reused successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExampleProjectResponse"
        "422":
          description: Invalid team_id or workspace creation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /v1/onboarding/assistant:
    post:
      summary: Create (or reuse) the general Valuz assistant
      operationId: createAssistant
      tags: [onboarding]
      description: |
        Creates (or reuses) the general 「Valuz 小助手」 in the user's agent
        library — backs TeamStep's「暂时不需要 team」choice. No project is
        created. Idempotent. Returns 422 if no model channel is configured.
      responses:
        "200":
          description: Assistant created or reused
          content:
            application/json:
              schema:
                type: object
                required: [agent_slug]
                properties:
                  agent_slug: {type: string}
        "422":
          description: No model channel configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

components:
  schemas:
    RunSummary:
      type: object
      required: [session_id, source_kind, workspace_id, title, status, updated_at]
      properties:
        session_id: {type: string}
        source_kind:
          type: string
          enum: [assistant, project_chat, task]
        workspace_id: {type: string}
        workspace_name: {type: string, nullable: true}
        task_id: {type: string, nullable: true}
        title: {type: string}
        status: {type: string}
        current_todo:
          type: object
