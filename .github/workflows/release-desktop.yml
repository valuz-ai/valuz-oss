name: Release Desktop

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v0.2.0). Leave empty to use package.json version."
        required: false
        type: string
      platform:
        description: "Platform to build"
        required: false
        default: "all"
        type: choice
        options:
          - all
          - mac-arm64
          - mac-x64
          - linux-arm64
          - windows-x64

concurrency:
  group: release-desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  set-version:
    name: Resolve version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - id: resolve
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            V="${{ github.ref_name }}"
          else
            V="${{ inputs.version }}"
          fi
          # Strip leading 'v'
          V="${V#v}"
          echo "version=$V" >> "$GITHUB_OUTPUT"

  build-mac:
    name: macOS (arm64)
    needs: set-version
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'mac-arm64' }}
    runs-on: studio-runner
    environment: CSC_KEY_PASSWORD
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('frontend/apps/desktop/package.json') }}
          restore-keys: electron-${{ runner.os }}-

      # ── Apple code-signing credentials ──────────────────────────
      # CSC_LINK: base64-encoded .p12 certificate
      # APPLE_API_KEY: base64-encoded App Store Connect API .p8 key
      - name: Import signing certificate
        env:
          CSC_LINK_B64: ${{ secrets.CSC_LINK_B64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK_B64" | base64 -d > /tmp/valuz-mac.p12
          echo "CSC_LINK=/tmp/valuz-mac.p12" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Import Apple notarization key
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "$APPLE_API_KEY_B64" | base64 -d > /tmp/AuthKey.p8
          echo "APPLE_API_KEY_PATH=/tmp/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"

      # ── Build ──────────────────────────────────────────────────
      - name: Build desktop app (signed + publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALUZ_VERSION: ${{ needs.set-version.outputs.version }}
        run: |
          bash scripts/build-desktop.sh --signed --publish=always

      - name: List artifacts
        run: ls -lh frontend/apps/desktop/release/

      # ── Upload build log on failure ────────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            frontend/apps/desktop/release/*.blockmap
            frontend/apps/desktop/release/*.dmg
            frontend/apps/desktop/release/latest-mac.yml
          if-no-files-found: warn

  build-mac-x64:
    name: macOS (x86_64)
    needs: set-version
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'mac-x64' }}
    runs-on: macos-runner-x86
    environment: CSC_KEY_PASSWORD
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/electron
          key: electron-${{ runner.os }}-${{ hashFiles('frontend/apps/desktop/package.json') }}
          restore-keys: electron-${{ runner.os }}-

      # ── Apple code-signing credentials ──────────────────────────
      - name: Import signing certificate
        env:
          CSC_LINK_B64: ${{ secrets.CSC_LINK_B64 }}
          CSC_KEY_PASSWORD: ${{ secrets.CSC_KEY_PASSWORD }}
        run: |
          echo "$CSC_LINK_B64" | base64 -d > /tmp/valuz-mac.p12
          echo "CSC_LINK=/tmp/valuz-mac.p12" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=$CSC_KEY_PASSWORD" >> "$GITHUB_ENV"
          echo "CSC_IDENTITY_AUTO_DISCOVERY=false" >> "$GITHUB_ENV"

      - name: Import Apple notarization key
        env:
          APPLE_API_KEY_B64: ${{ secrets.APPLE_API_KEY_B64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          echo "$APPLE_API_KEY_B64" | base64 -d > /tmp/AuthKey.p8
          echo "APPLE_API_KEY_PATH=/tmp/AuthKey.p8" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=$APPLE_API_KEY_ID" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=$APPLE_API_ISSUER" >> "$GITHUB_ENV"

      # ── Build ──────────────────────────────────────────────────
      - name: Build desktop app (signed + publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALUZ_VERSION: ${{ needs.set-version.outputs.version }}
        run: |
          bash scripts/build-desktop.sh --signed --publish=always

      - name: List artifacts
        run: ls -lh frontend/apps/desktop/release/

      # ── Upload build log on failure ────────────────────────────
      - name: Upload build log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-mac-x64
          path: |
            frontend/apps/desktop/release/*.blockmap
            frontend/apps/desktop/release/*.dmg
            frontend/apps/desktop/release/latest-mac.yml
          if-no-files-found: warn

  build-linux-arm64:
    name: Linux (arm64)
    needs: set-version
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'linux-arm64' }}
    runs-on: ubuntu-24.04-arm
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/.cache/electron
          key: electron-${{ runner.os }}-${{ hashFiles('frontend/apps/desktop/package.json') }}
          restore-keys: electron-${{ runner.os }}-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libffi-dev libssl-dev

      # ── Build ──────────────────────────────────────────────────
      - name: Build desktop app (unsigned + publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALUZ_VERSION: ${{ needs.set-version.outputs.version }}
        run: |
          bash scripts/build-desktop.sh --publish=always

      - name: List artifacts
        run: ls -lh frontend/apps/desktop/release/

      # ── Upload build log on failure ────────────────────────────
      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-linux-arm64
          path: |
            frontend/apps/desktop/release/*.AppImage
            frontend/apps/desktop/release/*.deb
            frontend/apps/desktop/release/*.blockmap
            frontend/apps/desktop/release/latest-linux.yml
          if-no-files-found: warn

  build-windows-x64:
    name: Windows (x64)
    needs: set-version
    if: ${{ github.event_name == 'push' || inputs.platform == 'all' || inputs.platform == 'windows-x64' }}
    runs-on: windows
    permissions:
      contents: write
    steps:     
      - name: Configure Git Mirror for Checkout
        run: git config --global url."https://gh-proxy.org/https://github.com/".insteadOf "https://github.com/"

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "25"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
          cache-dependency-glob: backend/uv.lock

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: ~/AppData/Local/electron/Cache
          key: electron-${{ runner.os }}-${{ hashFiles('frontend/apps/desktop/package.json') }}
          restore-keys: electron-${{ runner.os }}-

      # ── Build ──────────────────────────────────────────────────
      - name: Build desktop app (unsigned + publish)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VALUZ_VERSION: ${{ needs.set-version.outputs.version }}
          # uv's wheel install for the third-party-notices scan kept failing on
          # this runner with "os error 3" against the 8.3 short path
          # C:\Users\RUNNER~1\AppData\Local\Temp\… . Point uv's temp + cache at
          # the runner work-drive temp (a clean full path, no 8.3 alias) and
          # copy instead of hardlink (cache and venv can be on different drives).
          UV_LINK_MODE: copy
          UV_CACHE_DIR: ${{ runner.temp }}\uv-cache
          TMP: ${{ runner.temp }}
          TEMP: ${{ runner.temp }}
        shell: bash
        run: |
          bash scripts/build-desktop.sh --publish=always

      - name: List artifacts
        shell: bash
        run: ls -lh frontend/apps/desktop/release/

      # electron-builder refuses to upload if the release was published >2h ago.
      # Use gh as a fallback to guarantee the artifact lands in the release.
      - name: Ensure artifacts uploaded to GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ needs.set-version.outputs.version }}"
          shopt -s nullglob
          files=(frontend/apps/desktop/release/*.exe frontend/apps/desktop/release/*.blockmap frontend/apps/desktop/release/latest.yml)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No artifacts found to upload"
            exit 0
          fi
          echo "Uploading ${#files[@]} artifact(s) to release $TAG"
          gh release upload "$TAG" "${files[@]}" --clobber --repo valuz-ai/valuz-oss

      # ── Upload build log on failure ────────────────────────────
      - name: Upload build artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log-windows-x64
          path: |
            frontend/apps/desktop/release/*.exe
            frontend/apps/desktop/release/*.blockmap
            frontend/apps/desktop/release/latest.yml
          if-no-files-found: warn
