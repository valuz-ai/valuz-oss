        last_event:
          type: object
          nullable: true
          description: Tasks only — latest timeline event ({type, payload}).
          required: [type, payload]
          properties:
            type: {type: string}
            payload: {type: object, additionalProperties: true}
        model: {type: string, nullable: true}
        runtime: {type: string, nullable: true}
        updated_at: {type: integer, format: int64, description: "Unix epoch milliseconds (UTC). Format via new Date(ms)."}
    Agent:
      type: object
      required: [id, slug, name, description, instructions, runtime, model, skills, connector_types, source]
      properties:
        id: {type: string}
        slug: {type: string}
        name: {type: string}
        description: {type: string}
        instructions: {type: string}
        runtime: {type: string}
        model: {type: string}
        skills:
          type: array
          items: {type: string}
        connector_types:
          type: array
          items: {type: string}
        provider_id:
          type: string
          nullable: true
          description: >-
            Default model provider id for instances ((provider, model) pair).
            null for seeded/official agents (provider ids are install-local).
        effort:
          type: string
          nullable: true
          enum: [low, medium, high, xhigh, max]
          description: >-
            Default reasoning-effort budget prefilled into instances. null =
            no override (runtime SDK default). Project conversations read the
            budget from the bound agent.
        source: {type: string}
        readonly: {type: boolean, default: false, description: "If true, the agent cannot be edited."}
        deletable: {type: boolean, default: true, description: "If false, the agent cannot be deleted."}
        avatar:
          type: string
          nullable: true
          description: >-
            Preset icon key or uploaded asset URL for the agent's avatar.
            v1 supports preset keys only. null = no avatar set.
        kernel_agent_id:
          type: string
          nullable: true
          description: >-
            Shared kernel AgentConfig id (v2 live-reference). null until first
            deploy (built lazily). Lets a project member map back to its
            library agent (member.kernel_agent_id == agent.kernel_agent_id).
    CreateAgentRequest:
      type: object
      required: [name]
      properties:
        # Optional — backend derives a CJK-preserving, globally-unique slug
        # from ``name`` when omitted (VALUZ-AGENT-SLUG). UI sends name only.
        slug: {type: string, nullable: true}
        name: {type: string}
        description: {type: string, default: ""}
        instructions: {type: string, default: ""}
        runtime: {type: string, default: claude_agent}
        model: {type: string, default: claude-sonnet-4-6}
        skills:
          type: array
          items: {type: string}
        connector_types:
          type: array
          items: {type: string}
        provider_id: {type: string, nullable: true}
        effort: {type: string, nullable: true, enum: [low, medium, high, xhigh, max]}
        avatar: {type: string, nullable: true}
    UpdateAgentRequest:
      type: object
