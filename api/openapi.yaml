openapi: "3.1.0"
info:
  title: Valuz Agent API
  version: "0.3.0"
  description: Valuz Agent API contract — single source of truth

servers:
  - url: http://localhost:8000
    description: Local development

paths:
  /v1/runs:
    get:
      summary: List runs for the activity overview (running sessions / tasks)
      operationId: listRuns
      tags: [runs]
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [running, finished]
            default: running
          description: running = in-flight; finished = recently completed/failed runs
      responses:
        "200":
          description: Runs
          content:
            application/json:
              schema:
                type: object
                required: [runs]
                properties:
                  runs:
                    type: array
                    items:
                      $ref: "#/components/schemas/RunSummary"
  /v1/agents:
    get:
      summary: List official Agents (read-only)
      operationId: listAgents
      tags: [agents]
      parameters:
        - name: source
          in: query
          required: false
          schema:
            type: string
          description: Filter by source (official|custom).
      responses:
        "200":
          description: Official agents
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/Agent"
    post:
      summary: Create a user-defined Agent
      operationId: createAgent
      tags: [agents]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Created agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "409":
          description: Slug already exists
  /v1/agents/{slug}:
    get:
      summary: Get a single Agent
      operationId: getAgent
      tags: [agents]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
    patch:
      summary: Update an Agent
      operationId: updateAgent
      tags: [agents]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAgentRequest"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "404":
          description: Agent not found
    delete:
      summary: Delete an Agent
      operationId: deleteAgent
      tags: [agents]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Agent not found
        "409":
          description: Agent still deployed to one or more projects (解除派驻 first)
  /v1/agents/{slug}/deployments:
    get:
      summary: List the projects an agent is deployed (派驻) into
      operationId: listAgentDeployments
      tags: [agents]
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Deployments (live-reference 派驻 across projects)
          content:
            application/json:
              schema:
                type: object
                required: [deployments, count]
                properties:
                  count: {type: integer}
                  deployments:
                    type: array
                    items:
                      type: object
                      required: [workspace_id, agent_slug]
                      properties:
                        workspace_id: {type: string}
                        agent_slug:
                          type: string
                          description: Project-local member handle.
        "404":
          description: Agent not found
  /v1/workspaces/{workspace_id}/agents:
    get:
      summary: List workspace member agents
      operationId: listWorkspaceAgents
      tags: [agents]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace member agents
          content:
            application/json:
              schema:
                type: object
                required: [agents]
                properties:
                  agents:
                    type: array
                    items:
                      $ref: "#/components/schemas/MemberWithAgent"
    post:
      summary: Create a blank (template-free) agent in a workspace
      operationId: createBlankAgent
      tags: [agents]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateBlankAgentRequest"
      responses:
        "201":
          description: Created member agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberWithAgent"
        "409":
          description: Agent slug already exists in workspace
  /v1/workspaces/{workspace_id}/agents:deploy:
    post:
      summary: Deploy (派驻, live-reference) a library agent into a project
      operationId: deployAgent
      tags: [agents]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployAgentRequest"
      responses:
        "201":
          description: Created member agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MemberWithAgent"
        "404":
          description: Source agent not found
        "409":
          description: Agent slug already exists in workspace
  /v1/workspaces/{workspace_id}/agents/{agent_slug}:
    delete:
      summary: Delete a workspace agent and its kernel AgentConfig
      operationId: deleteWorkspaceAgent
      tags: [agents]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
        - name: agent_slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Deleted
        "404":
          description: Agent not found
  /v1/workspaces/{workspace_id}/tasks:
    post:
      summary: Kickoff a lead-dispatch task
      operationId: kickoffTask
      tags: [tasks]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/KickoffTaskRequest"
      responses:
        "201":
          description: Created task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "400":
          description: Workspace or lead agent not found
    get:
      summary: List workspace tasks
      operationId: listTasks
      tags: [tasks]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: object
                required: [tasks]
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
  /v1/tasks:
    get:
      summary: List tasks across every workspace
      description: |
        Global, cross-project task list ordered by updated_at desc. Powers the
        sidebar TASKS section so users can see what's running regardless of
        which project page they're on.
      operationId: listAllTasks
      tags: [tasks]
      parameters:
        - name: limit
          in: query
          required: false
          schema: {type: integer, default: 50, minimum: 1, maximum: 200}
      responses:
        "200":
          description: Tasks
          content:
            application/json:
              schema:
                type: object
                required: [tasks]
                properties:
                  tasks:
                    type: array
                    items:
                      $ref: "#/components/schemas/Task"
  /v1/tasks/{task_id}:
    get:
      summary: Task detail (header + runs + events)
      operationId: getTask
      tags: [tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Task detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskDetail"
        "404":
          description: Task not found
  /v1/tasks/{task_id}/events:
    get:
      summary: Task event log (ACTIVITY)
      operationId: listTaskEvents
      tags: [tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Events
          content:
            application/json:
              schema:
                type: object
                required: [events]
                properties:
                  events:
                    type: array
                    items:
                      $ref: "#/components/schemas/TaskEvent"
  /v1/tasks/{task_id}:intervene:
    post:
      summary: User intervention on a task (note/revise_goal/pause/resume/stop)
      operationId: interveneTask
      tags: [tasks]
      parameters:
        - name: task_id
          in: path
          required: true
          schema: {type: string}
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InterveneRequest"
      responses:
        "200":
          description: Updated task
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "404":
          description: Task not found
  /v1/runs/{session_id}:stop:
    post:
      summary: User-initiated single-member stop (interrupt subtask, node→rework)
      operationId: stopMember
      tags: [tasks]
      parameters:
        - name: session_id
          in: path
          required: true
          schema: {type: string}
      responses:
        "200":
          description: Member stopped
          content:
            application/json:
              schema:
                type: object
                properties:
                  stopped: {type: boolean}
                required: [stopped]
        "404":
          description: Subtask run not found
  /health:
    get:
      summary: Health check
      operationId: healthCheck
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"

  /api/v1/users:
    get:
      summary: List users
      operationId: listUsers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 20
      responses:
        "200":
          description: Paginated user list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PaginatedResponse"

  # ── Runtime Agents (REP-107) ───────────────────────────────────────

  /v1/runtimes:
    get:
      summary: List runtime agents and live availability
      operationId: listRuntimes
      tags: [runtimes]
      description: |
        Drives the Runtime picker on the session-creation form. Each
        entry exposes:

        - ``supported_protocols``: API protocols this runtime can
          dispatch — used to filter the list of compatible providers for
          the model dropdown.
        - ``available`` + ``unavailable_reason``: live host probe.
          ``codex`` reports ``available=false`` when the ``codex``
          binary is missing from PATH (and ``CODEX_BIN_OVERRIDE`` isn't
          set). The frontend should grey out unavailable runtimes and
          render ``unavailable_reason`` as a tooltip.
      responses:
        "200":
          description: Runtime list
          content:
            application/json:
              schema:
                type: object
                required: [runtimes]
                properties:
                  runtimes:
                    type: array
                    items:
                      $ref: "#/components/schemas/RuntimeListItem"

  # ── System (backend status & log path discovery) ────────────────────

  /v1/system/status:
    get:
      summary: Backend process status & introspection
      operationId: getSystemStatus
      tags: [system]
      description: |
        Snapshot of the running backend process — drives the desktop
        ``服务`` panel (status card on top of the log viewer). Cheap to
        call; safe to poll every few seconds.
      responses:
        "200":
          description: Current backend status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SystemStatusResponse"

  # ── Parser plugin setup (user-authorized model downloads) ──────────

  /v1/system/parser/setup:
    get:
      summary: List parser setup jobs and their current status
      operationId: listParserSetupJobs
      tags: [parser]
      description: |
        Returns one entry per registered setup_id (e.g. ``rapidocr_models``).
        Drives the "Local Capabilities" section on the parsing settings
        page — each row gets a "Download / Re-download" button.
      responses:
        "200":
          description: Setup job list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupJobListResponse"

  /v1/system/parser/setup/{setup_id}:
    parameters:
      - name: setup_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Current status of a single setup job
      operationId: getParserSetupJob
      tags: [parser]
      description: |
        Polled by the frontend ~every 2 seconds while a download is in
        flight. Cheap to call — pure DB read.
      responses:
        "200":
          description: Setup job status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupJobStatus"
        "404":
          description: Unknown setup_id
    delete:
      summary: Cancel an in-flight setup job
      operationId: cancelParserSetupJob
      tags: [parser]
      description: |
        Sets a cooperative cancellation flag. The worker thread observes
        it on the next chunk-loop iteration and cleans up ``*.partial``
        files; the final status reflects ``cancelled``.
      responses:
        "200":
          description: Updated status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupJobStatus"
        "404":
          description: Unknown setup_id

  /v1/system/parser/setup/{setup_id}/start:
    parameters:
      - name: setup_id
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Authorize and start a setup job
      operationId: startParserSetupJob
      tags: [parser]
      description: |
        Hard authorization gate: ``accept_license`` must be ``true`` and
        ``confirmed_source`` must equal the requirement's ``source``
        string. This is the only path that triggers network downloads —
        no silent fetch ever happens.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StartSetupJobRequest"
      responses:
        "200":
          description: Job started (or already complete)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SetupJobStatus"
        "400":
          description: Missing authorization fields
        "404":
          description: Unknown setup_id
        "409":
          description: Setup job already running

  # ── Parser settings (routing + per-plugin config) ──────────────────

  /v1/settings/parser/plugins:
    get:
      summary: List parser plugins shipped with this build
      operationId: listParserPlugins
      tags: [parser]
      description: |
        Each entry combines static descriptor metadata (id, name,
        config_schema, supported_kinds) with the *effective* runtime
        capability status (e.g. RapidOCR's image kind reads
        ``needs_setup`` until the user authorizes the download).
      responses:
        "200":
          description: Plugin list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginsListResponse"

  /v1/settings/parser:
    get:
      summary: Get parser routing configuration
      operationId: getParserRouting
      tags: [parser]
      responses:
        "200":
          description: Routing snapshot incl. server-rendered effective_by_kind
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParserRoutingResponse"
    patch:
      summary: Update parser routing configuration
      operationId: patchParserRouting
      tags: [parser]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ParserRoutingPatchRequest"
      responses:
        "200":
          description: Updated routing snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ParserRoutingResponse"
        "422":
          description: Invalid plugin id

  /v1/settings/parser/plugins/{plugin_id}/config:
    parameters:
      - name: plugin_id
        in: path
        required: true
        schema:
          type: string
    get:
      summary: Get user-supplied configuration for one plugin
      operationId: getPluginConfig
      tags: [parser]
      description: |
        ``has_secret`` indicates whether an API key has been stored;
        plaintext secrets are never returned.
      responses:
        "200":
          description: Plugin config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginConfigResponse"
        "404":
          description: Unknown plugin_id
    patch:
      summary: Update plugin configuration (API key, options)
      operationId: patchPluginConfig
      tags: [parser]
      description: |
        Plaintext ``secret`` is hashed into the FileSecretStore on
        receipt and only the ``secret_ref`` lands in
        ``valuz_app_setting``. Pass an empty string to clear.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PluginConfigPatchRequest"
      responses:
        "200":
          description: Updated plugin config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginConfigResponse"
        "404":
          description: Unknown plugin_id

  /v1/settings/parser/plugins/{plugin_id}/test:
    parameters:
      - name: plugin_id
        in: path
        required: true
        schema:
          type: string
    post:
      summary: Health-check a plugin with its current configuration
      operationId: testPlugin
      tags: [parser]
      description: |
        Builds the plugin's ``ParserBackend`` from stored config and
        invokes ``health_check``. No file upload required — surfaces
        bad API keys / wrong endpoints without burning a real parse.
      responses:
        "200":
          description: Test result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PluginTestResponse"
        "404":
          description: Unknown plugin_id

  # ── Document Library (M06) ─────────────────────────────────────────

  /v1/docs:
    get:
      summary: List documents
      operationId: listDocuments
      tags: [docs]
      parameters:
        - name: q
          in: query
          description: Search by filename
          schema:
            type: string
        - name: status
          in: query
          description: Filter by status (queued, processing, ready, failed)
          schema:
            type: string
            enum: [queued, processing, ready, failed]
      responses:
        "200":
          description: Document list
          content:
            application/json:
              schema:
                type: object
                required: [documents]
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentListItem"

  /v1/docs/health:
    get:
      summary: Docs runtime health
      operationId: docsHealth
      tags: [docs]
      responses:
        "200":
          description: Docs runtime health status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocsHealthResponse"

  /v1/docs/import:
    post:
      summary: Import files via multipart upload
      operationId: importFiles
      tags: [docs]
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [files]
              properties:
                files:
                  type: array
                  items:
                    type: string
                    format: binary
                workspace_id:
                  type: string
                  description: Optional workspace to bind imported docs
      responses:
        "200":
          description: Import task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTaskResponse"

  /v1/docs/import-folder:
    post:
      summary: Import local folder
      operationId: importFolder
      tags: [docs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ImportFolderRequest"
      responses:
        "200":
          description: Import task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTaskResponse"

  /v1/docs/reindex:
    post:
      summary: Reparse selected documents
      operationId: reindexDocuments
      tags: [docs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [document_ids]
              properties:
                document_ids:
                  type: array
                  items:
                    type: string
      responses:
        "200":
          description: Reindex task created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTaskResponse"

  /v1/docs/search:
    post:
      summary: Search documents via grep
      operationId: searchDocuments
      tags: [docs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SearchRequest"
      responses:
        "200":
          description: Search results
          content:
            application/json:
              schema:
                type: object
                required: [hits]
                properties:
                  hits:
                    type: array
                    items:
                      $ref: "#/components/schemas/SearchHit"

  /v1/docs/tasks/{task_id}:
    get:
      summary: Get import task status
      operationId: getImportTask
      tags: [docs]
      parameters:
        - name: task_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ImportTaskResponse"
        "404":
          description: Task not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /v1/docs/{doc_id}:
    get:
      summary: Get document details
      operationId: getDocument
      tags: [docs]
      parameters:
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentDetail"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"
    delete:
      summary: Delete a document
      operationId: deleteDocument
      tags: [docs]
      parameters:
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Document deleted
          content:
            application/json:
              schema:
                type: object
                properties:
                  document_id:
                    type: string

  /v1/docs/{doc_id}/preview:
    get:
      summary: Get document markdown preview
      operationId: getDocumentPreview
      tags: [docs]
      parameters:
        - name: doc_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Markdown preview content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DocumentPreview"
        "404":
          description: Document not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiError"

  /v1/workspaces/{workspace_id}/docs:
    get:
      summary: List documents bound to a workspace
      operationId: listWorkspaceDocs
      tags: [docs]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Workspace document list
          content:
            application/json:
              schema:
                type: object
                required: [documents]
                properties:
                  documents:
                    type: array
                    items:
                      $ref: "#/components/schemas/DocumentListItem"
    put:
      summary: Update workspace document bindings
      operationId: updateWorkspaceBindings
      tags: [docs]
      parameters:
        - name: workspace_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WorkspaceBindingsRequest"
      responses:
        "200":
          description: Bindings updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  ok:
                    type: boolean

  # ── Skills endpoints ───────────────────────────────────────────

  /v1/skills:
    get:
      summary: List skills catalog
      operationId: listSkills
      tags: [skills]
      parameters:
        - name: workspace_id
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Skills catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillsCatalog"
    post:
      summary: Create a new skill
      operationId: createSkill
      tags: [skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SkillCreateRequest"
      responses:
        "201":
          description: Skill created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillView"

  /v1/skills/import/session:
    post:
      summary: Import skill from session
      operationId: importSkillFromSession
      tags: [skills]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SessionSkillImportConfirmRequest"
      responses:
        "201":
          description: Skill imported
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillView"

  /v1/skills/create/chat/start:
    post:
      summary: Start AI-create-skill chat session
      description: |
        Creates a new chat-default session whose runtime auto-activates the
        bundled skill-creator skill and provisions a per-session staging
        directory. The frontend redirects to the regular conversation page
        in "Skill Creator" mode; the user can then ask the agent to author
        one or more skills, which are written under the staging dir.
        Use /v1/skills/staging/{session_id}/scan to inspect drafts and
        /v1/skills/staging/{session_id}/sync to persist them.
      operationId: startSkillCreateChat
      tags: [skills]
      responses:
        "201":
          description: Authoring session ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SkillCreateChatStartResponse"

  /v1/skills/staging/{session_id}/scan:
    get:
      summary: List draft skills written to a session's staging directory
      description: |
        Each subdirectory of the per-session staging dir that contains a
        SKILL.md is reported as a slug. The response also flags conflict
        kind ("none" / "same_source" / "diverged") against the user skill
        library so the UI can suggest overwrite vs fork-as-vN.
      operationId: scanSkillStaging
      tags: [skills]
      parameters:
        - in: path
          name: session_id
          required: true
          schema: { type: string }
      responses:
        "200":
          description: Staging contents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagingScanResponse"

  /v1/skills/staging/{session_id}/sync:
    post:
      summary: Persist selected staging slugs into the skill library
      description: |
        For each item the caller picks a strategy (overwrite | fork | abort).
        On `fork` an automatic `<slug>-vN` is suggested unless `new_slug` is
        provided. Default `target_scope=user` writes into the user skill
        library (controlled by VALUZ_USER_SKILLS_DIR); `target_scope=project`
        requires `workspace_id`.
      operationId: syncSkillStaging
      tags: [skills]
      parameters:
        - in: path
          name: session_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StagingSyncRequest"
      responses:
        "201":
          description: Sync results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagingSyncResponse"
        "404":
          description: Slug not found in staging
        "409":
          description: Fork target already exists
        "422":
          description: Invalid target scope or workspace

  /v1/skills/staging/{session_id}/optimize:
    post:
      summary: Pre-stage an existing skill for editing
      description: |
        Copies the source skill's directory into the session's staging dir
        (slug name preserved) and writes a `.staging-meta.json` recording the
        source path and content hash. The frontend then redirects the user
        into the chat session where the agent can iterate on the slug; on
        sync, the scan result reports `same_source` (safe overwrite) or
        `diverged` (suggest fork-as-vN) vs the original.
      operationId: optimizeSkillFromExisting
      tags: [skills]
      parameters:
        - in: path
          name: session_id
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/StagingOptimizeRequest"
      responses:
        "201":
          description: Skill staged for editing
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StagingOptimizeResponse"
        "404":
          description: Source skill not found
        "422":
          description: Source dir is not a valid skill

