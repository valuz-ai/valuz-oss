        instructions: {type: string}
        skills:
          type: array
          items: {type: string}
        connectors:
          type: array
          items: {type: string}
        provider_id: {type: string, nullable: true}
        effort: {type: string, nullable: true, enum: [low, medium, high, xhigh, max]}
    MemberWithAgent:
      type: object
      required: [member, agent]
      properties:
        member:
          $ref: "#/components/schemas/ProjectMember"
        agent:
          oneOf:
            - $ref: "#/components/schemas/AgentSummary"
